[build]
  publish = "frontend"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Toutes les requêtes /api/* → fonction serverless
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Page admin
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
